apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-api
  template:
    metadata:
      labels:
        app: my-api
    spec:
      # 1. ใช้กุญแจที่เราสร้างไว้ (acr-secret)
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: my-api
        # 2. ใช้ชื่อ Image และรหัส Tag SHA ที่เราเจอใน ACR ล่าสุด
        image: teeraregistry77.azurecr.io/my-secure-api:c52a1afd204e3ae4ccf24806199d69eba7969bba

        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: PORT
          value: "80"
---
apiVersion: v1
kind: Service
metadata:
  name: my-api-service
spec:
  type: ClusterIP
  selector:
    app: my-api
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-api-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-api-service
            port:
              number: 80