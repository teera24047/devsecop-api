<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSecOps Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #38bdf8;
            font-family: 'Courier New', monospace;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #0ea5e9;
            box-shadow: 0 4px 6px rgba(14, 165, 233, 0.2);
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-4xl font-bold text-center mb-10 text-white tracking-widest uppercase">DevSecOps Equipment</h1>
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </div>

    <script>
        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                const container = document.getElementById('product-list');
                
                container.innerHTML = products.map(p => `
                    <div class="card p-5 rounded-xl hover:scale-105 transition duration-300">
                        <img src="${p.image_url}" class="w-full h-48 object-cover rounded-lg mb-4">
                        <h2 class="text-xl font-bold text-white">${p.name}</h2>
                        <p class="text-2xl font-bold mt-2 text-sky-400">${p.price.toLocaleString()} THB</p>
                        <button class="w-full mt-4 bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 rounded uppercase tracking-wider">Purchase</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Failed to load data", err);
            }
        }
        loadProducts();
    </script>
</body>
</html>
