name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. สแกนโค้ด (SAST) - เปลี่ยนจาก app.py เป็น main.py ให้ตรงกับที่เราใช้จริง
    - name: Security Scan (SAST)
      run: |
        pip install bandit
        bandit -r main.py || true 

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 2. ขั้นตอน Build Image
    - name: Build Docker Image
      run: |
        az acr login --name teeraregistry77
        docker build -t teeraregistry77.azurecr.io/my-secure-api:${{ github.sha }} .

    # 3. เพิ่มขั้นตอน Container Scan (Trivy) 🛡️
    # จะสแกนหาช่องโหว่ใน OS และ Library ที่อยู่ใน Docker Image
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'teeraregistry77.azurecr.io/my-secure-api:${{ github.sha }}'
        format: 'table'
        exit-code: '0' # ตั้งเป็น 0 เพื่อให้ Pipeline รันต่อได้แม้จะเจอช่องโหว่ (ไว้ฝึกดู Log ก่อน)
        severity: 'CRITICAL,HIGH'

    # 4. Push ขึ้น ACR หลังจากสแกนแล้ว
    - name: Push Image to ACR
      run: |
        docker push teeraregistry77.azurecr.io/my-secure-api:${{ github.sha }}

    - name: Set AKS Context
      uses: azure/aks-set-context@v3
      with:
        resource-group: MyDevSecOpsRG
        cluster-name: MyDevSecOpsCluster

    - name: Deploy to Kubernetes
      run: |
        sed -i "s|image:.*|image: teeraregistry77.azurecr.io/my-secure-api:${{ github.sha }}|g" deployment.yaml
        kubectl apply -f deployment.yaml